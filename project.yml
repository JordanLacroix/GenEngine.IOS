name: GenEngine
options:
  bundleIdPrefix: com.jordanlacroix
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  GenEngine:
    type: application
    platform: iOS
    sources:
      - GenEngine
    settings:
      base:
        INFOPLIST_FILE: GenEngine/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanlacroix.genengine
        PRODUCT_NAME: GenEngine
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
  GenEngineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GenEngineTests
    dependencies:
      - target: GenEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanlacroix.genengine.tests
        GENERATE_INFOPLIST_FILE: YES
  # Harnais de capture d'écran. Il ne teste rien : il conduit l'application jusqu'aux
  # écrans qu'un agent ne peut pas atteindre autrement — le simulateur ne reçoit pas la
  # frappe clavier et n'accepte aucune injection de touche depuis `simctl` — et joint
  # une capture par écran au bundle de résultat. Il est délibérément **hors** du schéma
  # `GenEngine` : la CI ne doit pas payer un lancement d'application par exécution.
  GenEngineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - GenEngineUITests
    dependencies:
      - target: GenEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanlacroix.genengine.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: GenEngine
schemes:
  GenEngineScreens:
    build:
      targets:
        GenEngine: all
        GenEngineUITests: [test]
    test:
      targets:
        - GenEngineUITests
  GenEngine:
    build:
      targets:
        GenEngine: all
        GenEngineTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - GenEngineTests
