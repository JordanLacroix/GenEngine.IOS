name: GenEngine
options:
  bundleIdPrefix: com.jordanlacroix
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  GenEngine:
    type: application
    platform: iOS
    sources:
      - GenEngine
    settings:
      base:
        INFOPLIST_FILE: GenEngine/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanlacroix.genengine
        PRODUCT_NAME: GenEngine
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
  GenEngineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GenEngineTests
    dependencies:
      - target: GenEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jordanlacroix.genengine.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  GenEngine:
    build:
      targets:
        GenEngine: all
        GenEngineTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - GenEngineTests
