version: 2
updates:
  # Les actions sont épinglées par empreinte de commit complète. Sans mise à
  # jour automatique, ces épinglages vieillissent en silence : Dependabot les
  # fait remonter, empreinte et commentaire de version compris.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
  # Aucun écosystème Swift Package Manager n'est déclaré : le client n'a pas de
  # dépendance externe. À ajouter en même temps que la première d'entre elles.
